<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>April Fool 😜</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
      color: white;
      text-align: center;
      padding: 20px;

      background: linear-gradient(270deg, #ff0080, #7928ca, #00c6ff, #ffcc00);
      background-size: 800% 800%;
      animation: gradientShift 8s ease infinite;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 4rem);
      animation: bounce 0.8s infinite alternate;
      text-shadow: 0 0 15px rgba(255,255,255,0.7);
      margin: 0;
    }

    p {
      font-size: clamp(1rem, 4vw, 1.5rem);
      margin-top: 15px;
    }

    @keyframes bounce {
      from { transform: translateY(0); }
      to { transform: translateY(-15px); }
    }

    .emoji {
      position: absolute;
      font-size: 1.8rem;
      animation: float linear infinite;
      pointer-events: none;
    }

    @keyframes float {
      from {
        transform: translateY(100vh) rotate(0deg);
        opacity: 1;
      }
      to {
        transform: translateY(-10vh) rotate(360deg);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div>
    <h1>APRIL FOOL, Parul! 😜</h1>
    <p>You just got pranked!</p>
  </div>

  <script>
    const emojis = ["😂","🤣","😜","😆","😁","😹","🤪","😎"];

    function createEmoji() {
      const emoji = document.createElement("div");
      emoji.classList.add("emoji");
      emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];

      emoji.style.left = Math.random() * 100 + "vw";
      emoji.style.animationDuration = (Math.random() * 2 + 3) + "s";
      emoji.style.fontSize = (Math.random() * 1 + 1.5) + "rem";

      document.body.appendChild(emoji);

      setTimeout(() => emoji.remove(), 5000);
    }

    // 🔥 More emojis but still controlled
    setInterval(() => {
      for (let i = 0; i < 3; i++) {
        createEmoji();
      }
    }, 400);

    // 📳 Vibrate on load (works mainly on Android Chrome)
    if (navigator.vibrate) {
      navigator.vibrate([200, 100, 200, 100, 400]);
    }
  </script>

</body>
</html>
